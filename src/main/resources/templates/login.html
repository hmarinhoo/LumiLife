<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Login - LumiLife</title>
    <meta charset="UTF-8">

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

    <style>
        body {
            margin: 0;
            font-family: 'Inter', sans-serif;
            background-color: #F0FFDF;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
        }

        .container {
            text-align: center;
        }

        .logo {
            font-size: 40px;
            font-weight: 600;
            margin-bottom: 20px;
            color: #333;
        }

        .card {
            background: white;
            padding: 40px;
            border-radius: 20px;
            width: 300px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
        }

        input {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border-radius: 10px;
            border: 1px solid #ddd;
        }

        .btn {
            width: 100%;
            padding: 12px;
            border-radius: 25px;
            border: none;
            background-color: #FFAAB8;
            color: white;
            font-weight: 600;
            cursor: pointer;
            margin-top: 10px;
        }

        .btn:hover {
            opacity: 0.9;
        }

        .link {
            margin-top: 15px;
            display: block;
            color: #666;
            text-decoration: none;
            font-size: 14px;
        }

        .link:hover {
            text-decoration: underline;
        }
    </style>
</head>

<body>

<div class="container">

    <div class="logo">LumiLife</div>

    <div class="card">
        <h2>Entrar</h2>

        <form action="/login" method="post">
            <input type="email" name="email" placeholder="Email" required>
            <input type="password" name="senha" placeholder="Senha" required>

            <button type="submit" class="btn">Entrar</button>
        </form>

        <a href="/cadastro" class="link">Criar conta</a>
    </div>

</div>

</body>
</html>
